# ============================================================================
# saga_config.yaml — CANONE NORMATIVO machine-readable della saga Rocco & Zara
# ============================================================================
# Unica fonte di verità per enum, vincoli e quote. Erede del saga_config.yaml di
# isola, adattato a una SERIE-VIAGGIO (50–100 puntate). Da qui importeranno il
# serializzatore e gli audit; mai duplicare i valori altrove.
#
# I valori qualitativi (voce, stile, pugno) NON stanno qui: vivono in bible/ e
# ontologia/. Qui vive solo ciò che una macchina può verificare.
#
# STATO: allineato al canone del cartografo (geografia FATTA). I valori del mondo
# (regni, biomi, zone, origine) rispecchiano cartografia/CANONE_GEOGRAFICO.md.
# Restano da tarare sul campo solo le quote di saga (saga_quotas) col procedere delle storie.
# ============================================================================

config_version: 1

saga:
  id: rocco_e_zara
  nome_mondo: "le Terre Annodate"
  title: "Rocco & Zara"
  language: it
  format: serie_viaggio        # puntate autoconclusive su trama di fondo, lette come viaggio
  horizon_episodes: [50, 100]  # ordine di grandezza previsto del viaggio

# --- struttura del viaggio (vedi trama/archi_e_nodi.md) ---
journey:
  episode_id_format: "ep{n:02d}"        # ep01..epNN
  episode_types: [stazione, viaggio, cardine, respiro]
  cardine_every_arc: 1                  # ~1 episodio-cardine per arco (chiusura)
  arc_size: [6, 10]                     # episodi per arco
  planning_horizons: [skeleton, arco_corrente, arco_prossimo, semi_sparsi]

arcs:
  id_format: "arco_{nome}"
  # elenco ordinato degli archi = la "stella polare" (skeleton).
  # un arco ruota attorno a un REGNO (e alle sue zone-soglia / città-rovina).
  # esempio: arco_origine (Ep01 = l'incontro, B1) -> arco per ciascun regno lungo il viaggio.

# --- spina autoconclusiva di ogni episodio (canone seme, ereditato da Scrivia) ---
episode_spine:
  attribute_dominant: [distinguere, connettere, cambiare]   # EAR
  entry_point_type: [A, B, C, D, E, F]                       # apertura (canone seme)
  closure_type: [1, 2, 3, 4, 5, 6, 7]                        # chiusura (canone seme)
  register: [basso, medio, alto]
  pages_default: 12

# --- protagonisti (canone duro; il dettaglio è in bible/) ---
# Forestieri: specie esotiche fuori roster; la loro estraneità è il motore del viaggio.
protagonists:
  - { id: rocco, species: rinoceronte, ear: connettere, origin_bioma: savana,  origin_regno: pianura_alta,     forestiero: true }
  - { id: zara,  species: tigre,       ear: distinguere, origin_bioma: foresta, origin_regno: laghi_occidente,  forestiero: true }

# --- archi lunghi che corrono sotto le avventure (vedi trama/) ---
long_arcs:
  saga_ear: "distinguere(due mondi) -> connettere(ponti) -> cambiare(una casa)"
  growth:
    - { who: rocco, axis: vergogna_corno, from: vergogna, to: forza }
    - { who: zara,  axis: troppo_piccola, from: piccola,  to: misura_giusta }
  fears:
    - { who: rocco, fear: cose_piccole_e_veloci, first_seen: ep01 }
    - { who: zara,  fear: buio_profondo,         first_seen: ep01 }

# --- LA MISSIONE / trama di fondo (fonte: trama/SPINE_NARRATIVO.md) ---
# Subtesto MAI detto in-storia. Lo strano è sempre FISICO (pietra, nodo), mai "energia".
missione:
  oggetto: cordone               # un cordone annodato (oggetto vero); nome finale -> lessico/
  meccanica: "un nodo per regno libero, annodato al suo Luogo Antico (rito concreto, EAR a scala episodio)"
  nodi_totali: 5                 # i 5 regni liberi (la Serpe non ha nodo: il suo Luogo è sepolto)
  precursore: toraki             # tigre bianca, fratello di Zara (nome di lavoro; bible/zara.md)
  antagonista: la_serpe          # Gran Ducato (cartografia/regni/pianura_alta/la_serpe.md)
  luoghi_antichi: cartografia/luoghi_antichi.md   # i perni reali (uno per regno)
  terminus: toscana              # dove Toraki aspetta (DEFAULT) — DA CONFERMARE (alt: anello a Spondalta)
  finale: chiuso                 # la rete si completa; l'ultima pagina sfiora "qualcosa di nuovo", senza dirlo
  rotta:                         # ordine dei nodi lungo il corridoio (= ordine degli archi)
    - laghi_occidente            # 1° nodo (casa)
    - laghi_oriente              # le Pietre Incise
    - pianura_bassa              # le Rovine Ordinate (oltre il Gran Fiume)
    - selva_di_mezzo             # l'Altare di Roccia (tracce di Toraki)
    - toscana                    # cuore dei primi (ultimo nodo / Toraki)
  regole_anti_newage:
    - "niente energia/vibrazione/risveglio/connessione cosmica"
    - "il Cordone è un oggetto; i Luoghi sono pietra vera"
    - "i primi: mai nominati, mai mostrati, mai animali"

# --- IL MONDO (canone del cartografo; fonte di verità: cartografia/CANONE_GEOGRAFICO.md) ---
# Base reale: corridoio Muro del Nord -> Terre del Leone di Pietra (DEM Terrarium 30m + OSM, riproducibile).
cartografia:
  fonte_verita: cartografia/CANONE_GEOGRAFICO.md
  griglia: "5x5 (colonne A-E ovest->est, righe 1-5 nord->sud)"
  origine: { id: collina_incontro, terra: B1, place: "monti del lago (Spondalta)", ll: [9.415, 45.85],
             nota: "la collina dell'incontro Rocco&Zara — soglia tra Laghi del Vespro e Gran Ducato (Serpe)" }
  # biomi = reskin OSM -> mondo (enum reale usato nei zones/*.geojson)
  biomes: [foresta, savana, acqua, roccia, rovina, umido]
  reskin:                       # OSM -> bioma della saga
    bosco: foresta              # wood/forest
    aperto: savana              # grass/farmland
    acqua: acqua                # water/waterway/wetland
    insediamento: rovina        # residential/place -> "la civiltà che se n'è andata"
    vetta: roccia               # peak
  # i 6 regni-comuni (specie-stemma + capitale); dettaglio in cartografia/regni/
  regni:
    - { id: laghi_occidente, nome: "Laghi del Vespro", stemma: lince,         capitale: Rivalba }
    - { id: laghi_oriente,   nome: "Conca Ruggente",   stemma: leonessa,      capitale: Forterocca }
    - { id: pianura_alta,    nome: "Gran Ducato",       stemma: serpe,      capitale: Anguicorte }
    - { id: pianura_bassa,   nome: "Piana dei Savi",      stemma: "gufo+aquila", capitale: Savenza }
    - { id: selva_di_mezzo,  nome: "Selva di Mezzo",     stemma: cervo,         capitale: "Città-rovina della Selva" }
    - { id: toscana,         nome: "Terre del Leone di Pietra",            stemma: leone,         capitale: Leonalba }
  # grammatica universale delle 7 zone (regola "punta il dito sul km²")
  zone_grammar: [cuore, spina, bosco, orlo, soglia, vie, rovina]

# --- entità (categorie del mondo) ---
entities:
  categories: [characters, regni, zone, faunario, classi, corporazioni, voci, locations, objects, creatures]
  # faunario = specie esclusive per regno (stile Pokemon); creatures = "dell'episodio" (monster of the week);
  # classi/corporazioni/voci = il modello-società (metodo Orwell + voce Calvino) per estrarre i personaggi

# --- continuità: macchina della trama di fondo (vedi trama/) ---
continuity:
  seeds:
    kinds: [oggetto, gesto, frase, suono, dettaglio_del_mondo]
    plant_then_bloom: true        # piantati in un episodio, fioriscono in un altro
  debts:
    kinds: [promessa, domanda, preoccupazione, oggetto_perso]
  effects_threshold_required: true  # un cambiamento è canonico solo se threshold_crossed (anti-drift)
  recap_per_arc: true               # recap canonico a chiusura d'arco (nuova baseline)

# --- quote di saga (anti-ripetizione su scala lunga; vedi archi_e_nodi.md §7) ---
# [DA TARARE sul campo, come le quote_tracker di isola]
saga_quotas:
  recurring_creature_returns_max: 4     # quante volte una creatura ricorrente può tornare
  same_episode_type_in_window:          # varietà dei tipi in una finestra di puntate
    window: 4
    max_same: 2
  lexicon: []                           # tetti lessicali di saga [DA POPOLARE in stile isola]

# --- vincoli globali (presenza umana, ecc.) ---
world_rules:
  cosmologia: bible/COSMOLOGIA.md       # solo-autore: il ciclo, mai mostrato
  human_presence: only_past             # umani solo come rovine abbandonate; mai in scena
  animals_form: naturalistic            # animali fisicamente naturalistici, MAI vestiti/costume
  anthropomorphism: cultural_only       # solo lingua/società/miti/politica; no sartoriale (vedi bible/STILE_VISIVO.md)
  object_handling: minimal              # maneggio minimo dove serve (annodare il Cordone, portare un pegno) — come corvidi/lontre/elefanti
  recurring_character_marker: natural_sign  # segno naturale (cicatrice/orecchio/macchia/occhio) o raro pegno portato; mai indumento
